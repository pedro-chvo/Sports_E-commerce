<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol — SportZone</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/index.html">SPORT<span>ZONE</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto ms-4 gap-1">
        <li class="nav-item">
          <a class="nav-link" href="/pages/categorias/basquetbol.html">Basquetbol</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/pages/categorias/futbol.html">Fútbol</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/pages/categorias/voleibol.html">Voleibol</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <a href="/pages/cart.html" class="nav-cart-link">
          <i class="bi bi-bag"></i>
          <span class="cart-badge cart-count" style="display:none">0</span>
        </a>
        <div id="nav-auth"></div>
      </div>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="cat-hero" style="background:linear-gradient(140deg,#001a05,#003a0d);">
  <div class="cat-hero-icon">⚽</div>
  <div class="container">
    <p class="cat-hero-eyebrow">SportZone · Categoría</p>
    <h1 class="cat-hero-title">Fútbol</h1>
    <p class="cat-hero-desc">
      Tacos, balones, jerseys y accesorios para dominar la cancha.
    </p>
  </div>
</section>

<!-- FILTROS + GRID -->
<section class="py-5">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
      <div class="filter-bar" id="filtros">
        <button class="filter-btn active" data-cat="">Todo</button>
        <button class="filter-btn" data-cat="Calzado">Calzado</button>
        <button class="filter-btn" data-cat="balones">Balones</button>
        <button class="filter-btn" data-cat="ropa">Ropa</button>
        <button class="filter-btn" data-cat="accesorios">Accesorios</button>
      </div>
      <span id="conteo" style="font-size:.8rem;color:var(--gray);"></span>
    </div>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3" id="grid-productos">
      <div class="loading-box col-12"><div class="spinner"></div>Cargando…</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="footer-brand">SPORT<span>ZONE</span></div>
        <p class="footer-desc">Equipamiento de alto rendimiento.</p>
      </div>
      <div class="col-6 col-lg-2">
        <div class="footer-col-title">Deportes</div>
        <ul class="footer-list">
          <li><a href="/pages/categorias/basquetbol.html">Basquetbol</a></li>
          <li><a href="/pages/categorias/futbol.html">Fútbol</a></li>
          <li><a href="/pages/categorias/voleibol.html">Voleibol</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom"><span>&copy; 2025 SportZone.</span></div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/auth.js"></script>
<script src="/src/js/api.js"></script>
<script src="/src/js/cart.js"></script>
<script src="/src/js/catalog.js"></script>
<script>
  const DEPORTE = 'futbol';

  async function cargar(cat) {
    const params = { deporte: DEPORTE };
    if (cat) params.categoria = cat;

    mostrarLoading('grid-productos');
    try {
      const lista = await productosAPI.getAll(params);
      const el = document.getElementById('grid-productos');
      document.getElementById('conteo').textContent = lista.length + ' producto' + (lista.length !== 1 ? 's' : '');
      if (!lista.length) { mostrarVacio('grid-productos', 'Sin productos en esta categoría'); return; }
      el.innerHTML = lista.map(renderProductCard).join('');
    } catch {
      mostrarVacio('grid-productos', 'Error al cargar productos');
    }
  }

  document.getElementById('filtros').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#filtros .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cargar(btn.dataset.cat);
  });

  document.addEventListener('DOMContentLoaded', () => cargar(''));
</script>

</body>
</html>
