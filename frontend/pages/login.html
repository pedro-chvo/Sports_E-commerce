<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — SportZone</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="auth-page">

<div class="container px-3">
  <div class="auth-box">

    <div class="auth-logo">SPORT<span>ZONE</span></div>
    <p class="auth-logo-sub">Accede a tu cuenta o crea una nueva</p>

    <div class="auth-tabs">
      <button class="auth-tab activo" onclick="cambiarTab('login')">Iniciar sesión</button>
      <button class="auth-tab"        onclick="cambiarTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <form class="formulario activo" id="form-login" onsubmit="handleLogin(event)">
      <div class="campo">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-control" type="email" id="login-email"
               placeholder="correo@ejemplo.com" required>
      </div>
      <div class="campo">
        <label class="form-label" for="login-password">Contraseña</label>
        <input class="form-control" type="password" id="login-password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Entrar</button>
      <p class="mensaje-error" id="error-login"></p>
    </form>

    <!-- REGISTER -->
    <form class="formulario" id="form-register" onsubmit="handleRegister(event)">
      <div class="campo">
        <label class="form-label" for="reg-nombre">Nombre</label>
        <input class="form-control" type="text" id="reg-nombre"
               placeholder="Tu nombre completo" required>
      </div>
      <div class="campo">
        <label class="form-label" for="reg-email">Email</label>
        <input class="form-control" type="email" id="reg-email"
               placeholder="correo@ejemplo.com" required>
      </div>
      <div class="campo">
        <label class="form-label" for="reg-password">Contraseña</label>
        <input class="form-control" type="password" id="reg-password"
               placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn-submit">Crear cuenta</button>
      <p class="mensaje-error" id="error-register"></p>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.82rem;color:var(--gray);">
      <a href="/index.html" style="color:var(--dark);font-weight:600;">← Volver al inicio</a>
    </p>

  </div>
</div>

<script src="/src/js/auth.js"></script>
<script>
  if (estaLogueado()) window.location.href = '/index.html';

  function cambiarTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('activo',
        (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    document.getElementById('form-login').classList.toggle('activo', tab === 'login');
    document.getElementById('form-register').classList.toggle('activo', tab === 'register');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const err = document.getElementById('error-login');
    err.textContent = '';
    try {
      await login(
        document.getElementById('login-email').value,
        document.getElementById('login-password').value
      );
      window.location.href = '/index.html';
    } catch (ex) { err.textContent = ex.message; }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const err = document.getElementById('error-register');
    err.textContent = '';
    try {
      await register(
        document.getElementById('reg-nombre').value,
        document.getElementById('reg-email').value,
        document.getElementById('reg-password').value
      );
      window.location.href = '/index.html';
    } catch (ex) { err.textContent = ex.message; }
  }
</script>

</body>
</html>
