<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sports E-commerce</title>
    <link rel="stylesheet" href="../src/css/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .auth-card h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            padding: 0.6rem;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.activo {
            color: #e63946;
            border-bottom-color: #e63946;
        }

        .formulario { display: none; }
        .formulario.activo { display: block; }

        .campo {
            margin-bottom: 1rem;
        }

        .campo label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            color: #555;
        }

        .campo input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .campo input:focus {
            outline: none;
            border-color: #e63946;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: #e63946;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .btn-submit:hover { background: #c1121f; }

        .mensaje-error {
            color: #e63946;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            text-align: center;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h1>Sports E-commerce</h1>

    <div class="tabs">
        <div class="tab activo" onclick="cambiarTab('login')">Iniciar sesión</div>
        <div class="tab" onclick="cambiarTab('register')">Registrarse</div>
    </div>

    <form class="formulario activo" id="form-login" onsubmit="handleLogin(event)">
        <div class="campo">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="campo">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Entrar</button>
        <p class="mensaje-error" id="error-login"></p>
    </form>

    <form class="formulario" id="form-register" onsubmit="handleRegister(event)">
        <div class="campo">
            <label for="reg-nombre">Nombre</label>
            <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
        </div>
        <div class="campo">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="campo">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-submit">Crear cuenta</button>
        <p class="mensaje-error" id="error-register"></p>
    </form>
</div>

<script src="../src/js/auth.js"></script>
<script>
    if (estaLogueado()) window.location.href = '../index.html';

    const cambiarTab = (tab) => {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('activo', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
        document.getElementById('form-login').classList.toggle('activo', tab === 'login');
        document.getElementById('form-register').classList.toggle('activo', tab === 'register');
    };

    const handleLogin = async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('error-login');
        errorEl.textContent = '';
        try {
            await login(
                document.getElementById('login-email').value,
                document.getElementById('login-password').value
            );
            window.location.href = '../index.html';
        } catch (err) {
            errorEl.textContent = err.message;
        }
    };

    const handleRegister = async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('error-register');
        errorEl.textContent = '';
        try {
            await register(
                document.getElementById('reg-nombre').value,
                document.getElementById('reg-email').value,
                document.getElementById('reg-password').value
            );
            window.location.href = '../index.html';
        } catch (err) {
            errorEl.textContent = err.message;
        }
    };
</script>

</body>
</html>
