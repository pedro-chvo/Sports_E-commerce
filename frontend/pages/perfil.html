<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — SportZone</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="page-cart">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/index.html">SPORT<span>ZONE</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto ms-4 gap-1">
        <li class="nav-item"><a class="nav-link" href="/pages/categorias/basquetbol.html">Basquetbol</a></li>
        <li class="nav-item"><a class="nav-link" href="/pages/categorias/futbol.html">Fútbol</a></li>
        <li class="nav-item"><a class="nav-link" href="/pages/categorias/voleibol.html">Voleibol</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <a href="/pages/cart.html" class="nav-cart-link">
          <i class="bi bi-bag"></i>
          <span class="cart-badge cart-count" style="display:none">0</span>
        </a>
        <div id="nav-auth"></div>
      </div>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<div style="background:var(--white);border-bottom:1px solid var(--border);">
  <div class="container py-2">
    <span style="font-size:.75rem;color:var(--gray);">
      <a href="/index.html" style="color:var(--gray);">Inicio</a>
      &nbsp;/&nbsp; Mi Perfil
    </span>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container py-5" style="max-width:680px;">
  <h1 style="font-family:var(--font-heading);font-size:1.8rem;font-weight:700;
              text-transform:uppercase;letter-spacing:.04em;margin-bottom:2rem;">
    Mi Perfil
  </h1>

  <!-- Datos personales -->
  <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-4" style="font-family:var(--font-heading);text-transform:uppercase;
                                       font-size:.9rem;letter-spacing:.05em;">
        Datos personales
      </h5>
      <form id="form-datos" onsubmit="handleDatos(event)">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" id="p-nombre" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="p-email" required>
        </div>
        <p class="mensaje-error" id="error-datos"></p>
        <button type="submit" class="btn btn-primary btn-sm px-4">Guardar cambios</button>
      </form>
    </div>
  </div>

  <!-- Cambio de contraseña -->
  <div class="card border-0 shadow-sm" style="border-radius:12px;">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-4" style="font-family:var(--font-heading);text-transform:uppercase;
                                       font-size:.9rem;letter-spacing:.05em;">
        Cambiar contraseña
      </h5>
      <form id="form-password" onsubmit="handlePassword(event)">
        <div class="mb-3">
          <label class="form-label">Contraseña actual</label>
          <input type="password" class="form-control" id="p-pass-actual" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" class="form-control" id="p-pass-nueva"
                 required minlength="6" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar nueva contraseña</label>
          <input type="password" class="form-control" id="p-pass-confirmar" required>
        </div>
        <p class="mensaje-error" id="error-password"></p>
        <button type="submit" class="btn btn-primary btn-sm px-4">Cambiar contraseña</button>
      </form>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>&copy; 2026 SportZone. Todos los derechos reservados.</span>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/auth.js"></script>
<script src="/src/js/api.js"></script>
<script src="/src/js/cart.js"></script>
<script>
  if (!estaLogueado()) window.location.href = '/pages/login.html';

  /* Cargar datos actuales */
  document.addEventListener('DOMContentLoaded', () => {
    const u = getUsuario();
    if (u) {
      document.getElementById('p-nombre').value = u.nombre || '';
      document.getElementById('p-email').value  = u.email  || '';
    }
  });

  async function handleDatos(e) {
    e.preventDefault();
    const err = document.getElementById('error-datos');
    err.textContent = '';
    try {
      const actualizado = await usuariosAPI.actualizarPerfil({
        nombre: document.getElementById('p-nombre').value.trim(),
        email:  document.getElementById('p-email').value.trim(),
      });
      localStorage.setItem('usuario', JSON.stringify(actualizado));
      mostrarToast('Datos actualizados correctamente.', 'success');
    } catch(ex) {
      err.textContent = ex.message;
    }
  }

  async function handlePassword(e) {
    e.preventDefault();
    const err = document.getElementById('error-password');
    err.textContent = '';
    const nueva     = document.getElementById('p-pass-nueva').value;
    const confirmar = document.getElementById('p-pass-confirmar').value;
    if (nueva !== confirmar) {
      err.textContent = 'Las contraseñas no coinciden.';
      return;
    }
    try {
      await usuariosAPI.cambiarPassword({
        passwordActual: document.getElementById('p-pass-actual').value,
        passwordNueva:  nueva,
      });
      mostrarToast('Contraseña actualizada correctamente.', 'success');
      document.getElementById('form-password').reset();
    } catch(ex) {
      err.textContent = ex.message;
    }
  }
</script>

</body>
</html>
